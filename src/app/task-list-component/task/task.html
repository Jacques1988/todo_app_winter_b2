<li class="task-list-container-element">
  <div class="checkbox-container">
    <input
      (change)="toggleTask()"
      [checked]="task().checked"
      class="checkbox"
      type="checkbox"
    />
  </div>
  <div [class.strokethrough]="task().checked" class="task-text">
    {{ task().name }}
  </div>
  <div class="task-status">{{ task().status }}</div>
</li>
